name: 🐍 Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    name: Generate snake SVGs
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 🐍 Generate snake (dark + light)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#00ffcc&color_dots=#0d1117,#161b22,#1D9E75,#00ffcc,#39ff14
            dist/snake-light.svg?palette=github-light&color_snake=#1D9E75

      - name: 🚀 Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore: update snake animation [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}